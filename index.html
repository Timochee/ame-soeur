<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui est ton âme sœur ?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trouve ton âme sœur 💘</h1>
        <p class="subtitle">Entre tes infos et découvre qui est fait(e) pour toi</p>

        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Ton prénom">
        </div>

        <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Ton nom de famille">
        </div>

        <div class="form-group">
            <label for="dob">Date de naissance</label>
            <input type="date" id="dob">
        </div>

        <p class="error" id="error">Remplis tous les champs pour découvrir ton âme sœur !</p>

        <button onclick="decouvrir()">Découvrir ✨</button>

        <div class="result" id="result">
            <p class="result-label">Ton âme sœur s'appelle...</p>
            <p class="result-name" id="resultName"></p>
            <div class="hearts">💕💘💕</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
