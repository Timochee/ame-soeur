<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui est ton âme sœur ?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trouve ton âme sœur 💘</h1>

        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Ton prénom">
        </div>

        <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Ton nom de famille">
        </div>

        <div class="form-group">
            <label for="dob">Date de naissance</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label for="orientation">Tu craques plutôt pour...</label>
            <select id="orientation">
                <option value="" disabled selected>Choisis</option>
                <option value="homme">Les hommes</option>
                <option value="femme">Les femmes</option>
                <option value="both">Les deux</option>
                <option value="other">Autres</option>
            </select>
        </div>

        <p class="error" id="error">Remplis tous les champs !</p>

        <button onclick="decouvrir()">Découvrir ✨</button>

        <div class="result" id="result">
            <p class="result-name" id="resultName"></p>
            <div class="hearts-container" id="heartsContainer"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
