<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qui est ton âme sœur ?</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="hearts-layer" id="heartsLayer"></div>
      <div class="wrapper">
        <div class="form-section">
          <h1>Trouve ton âme sœur 💘</h1>

          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Ton prénom" />
          </div>

          <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Ton nom de famille" />
          </div>

          <div class="form-group">
            <label for="dob">Date de naissance</label>
            <input type="date" id="dob" />
          </div>

          <div class="form-group">
            <label>Tu craques plutôt pour...</label>
            <div class="pills" id="pills">
              <button type="button" class="pill" data-value="homme">
                👨 Hommes
              </button>
              <button type="button" class="pill" data-value="femme">
                👩 Femmes
              </button>
              <button type="button" class="pill" data-value="both">
                💜 Les deux
              </button>
              <button type="button" class="pill" data-value="other">
                🌈 Autres
              </button>
            </div>
            <input type="hidden" id="orientation" />
          </div>

          <p class="error" id="error">Dis-nous en un peu plus sur toi avant de trouver l'amour 💘</p>

          <button class="btn-main" id="btnMain">Découvrir ✨</button>
        </div>

        <div class="result" id="result">
          <p class="result-intro" id="resultIntro">Ton âme sœur s'appelle...</p>
          <p class="result-name" id="resultName"></p>
          <button class="btn-retry" id="btnRetry">Recommencer</button>
        </div>
      </div>
    </div>

    <script src="prenoms.js"></script>
    <script src="script.js"></script>
  </body>
</html>
